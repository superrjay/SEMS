<!DOCTYPE html>
<html>
<head>
    <title>Debug Scheduling System</title>
    <link rel="stylesheet" href="assets/uikit/css/uikit.min.css" />
    <style>
        body { padding: 30px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #2c3e50; border-bottom: 3px solid #8e44ad; padding-bottom: 15px; }
        .test-box { 
            background: white; 
            padding: 20px; 
            margin: 20px 0; 
            border-left: 5px solid #8e44ad; 
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .status { 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 5px; 
            font-weight: bold;
            font-size: 1.1rem;
        }
        .pass { background: #d4edda; color: #155724; border-left: 5px solid #28a745; }
        .fail { background: #f8d7da; color: #721c24; border-left: 5px solid #dc3545; }
        .loading { background: #fff3cd; color: #856404; border-left: 5px solid #ffc107; }
        button { margin-top: 15px; }
        code { 
            background: #f4f4f4; 
            padding: 2px 6px; 
            border-radius: 3px; 
            font-family: monospace;
        }
        .log { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 5px; 
            font-family: monospace; 
            font-size: 0.9rem;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Scheduling System - Diagnostic Test</h1>

        <!-- Test 1: PHP -->
        <div class="test-box">
            <h2>1️⃣ PHP Server Status</h2>
            <div id="phpStatus" class="status loading">Testing PHP...</div>
            <button class="uk-button uk-button-primary" onclick="testPHP()">Re-test PHP</button>
        </div>

        <!-- Test 2: API -->
        <div class="test-box">
            <h2>2️⃣ API Connection</h2>
            <div id="apiStatus" class="status loading">Testing API...</div>
            <button class="uk-button uk-button-primary" onclick="testAPI()">Re-test API</button>
            <div id="apiLog" class="log"></div>
        </div>

        <!-- Test 3: Database -->
        <div class="test-box">
            <h2>3️⃣ Database Connection</h2>
            <div id="dbStatus" class="status loading">Testing Database...</div>
            <button class="uk-button uk-button-primary" onclick="testDB()">Re-test Database</button>
            <div id="dbLog" class="log"></div>
        </div>

        <!-- Test 4: Test Form Submission -->
        <div class="test-box">
            <h2>4️⃣ Test Module 1 Form Submission</h2>
            
            <label class="uk-form-label">Section Name:</label>
            <input class="uk-input" type="text" id="testSecName" placeholder="e.g. TEST" value="TEST">
            
            <label class="uk-form-label" style="margin-top: 10px;">Subject:</label>
            <input class="uk-input" type="text" id="testSubject" placeholder="e.g. Testing" value="Testing">
            
            <label class="uk-form-label" style="margin-top: 10px;">Category:</label>
            <select class="uk-select" id="testCategory">
                <option value="Major">Major</option>
                <option value="Minor">Minor</option>
            </select>
            
            <button class="uk-button uk-button-success uk-margin-top" onclick="testFormSubmit()">Test Form Submit</button>
            <div id="formStatus" class="status" style="margin-top: 15px; display: none;"></div>
            <div id="formLog" class="log"></div>
        </div>

        <!-- Summary -->
        <div class="test-box">
            <h1>📋 Summary</h1>
            <div id="summary" style="font-size: 1rem; line-height: 1.8;">
                <p>Run all tests above to see system status...</p>
            </div>
            <button class="uk-button uk-button-primary uk-button-large" onclick="runAllTests()">🚀 Run All Tests</button>
        </div>
    </div>

    <script src="assets/uikit/js/uikit.min.js"></script>
    <script>
        let results = {};

        function log(elementId, message) {
            const elem = document.getElementById(elementId);
            if (!elem) return;
            elem.innerHTML = (elem.innerHTML || '') + message + '\n';
            elem.scrollTop = elem.scrollHeight;
        }

        function testPHP() {
            const phpStatus = document.getElementById('phpStatus');
            phpStatus.className = 'status loading';
            phpStatus.textContent = 'Testing PHP...';
            results.php = null;

            fetch('test_connection.php')
                .then(r => r.text())
                .then(text => {
                    if (text.includes('✅') || text.includes('Connected')) {
                        phpStatus.className = 'status pass';
                        phpStatus.textContent = '✅ PHP Working - Server is responding';
                        results.php = true;
                    } else {
                        phpStatus.className = 'status fail';
                        phpStatus.textContent = '❌ PHP Response unexpected';
                        results.php = false;
                    }
                })
                .catch(e => {
                    phpStatus.className = 'status fail';
                    phpStatus.textContent = '❌ PHP Error: ' + e.message;
                    results.php = false;
                });
        }

        function testAPI() {
            const apiStatus = document.getElementById('apiStatus');
            const apiLog = document.getElementById('apiLog');
            apiStatus.className = 'status loading';
            apiStatus.textContent = 'Testing API...';
            apiLog.textContent = '';
            results.api = null;

            log('apiLog', '→ Calling: api_section.php?action=getSections\n');

            fetch('api_section.php?action=getSections')
                .then(r => {
                    log('apiLog', '✓ HTTP Status: ' + r.status + '\n');
                    return r.json();
                })
                .then(data => {
                    log('apiLog', '✓ Received JSON: ' + JSON.stringify(data, null, 2) + '\n');
                    if (data.success) {
                        apiStatus.className = 'status pass';
                        apiStatus.textContent = '✅ API Working - Got ' + (data.data ? data.data.length : 0) + ' sections';
                        results.api = true;
                    } else {
                        apiStatus.className = 'status fail';
                        apiStatus.textContent = '❌ API Error: ' + data.message;
                        results.api = false;
                    }
                })
                .catch(e => {
                    log('apiLog', '✗ Error: ' + e.message + '\n');
                    apiStatus.className = 'status fail';
                    apiStatus.textContent = '❌ API Error: ' + e.message;
                    results.api = false;
                });
        }

        function testDB() {
            const dbStatus = document.getElementById('dbStatus');
            const dbLog = document.getElementById('dbLog');
            dbStatus.className = 'status loading';
            dbStatus.textContent = 'Testing Database...';
            dbLog.textContent = '';
            results.db = null;

            log('dbLog', '→ Calling: test_connection.php\n');

            fetch('test_connection.php')
                .then(r => r.text())
                .then(text => {
                    log('dbLog', '✓ Response received (length: ' + text.length + ')\n');
                    if (text.includes('Connected')) {
                        dbStatus.className = 'status pass';
                        dbStatus.textContent = '✅ Database Connected';
                        results.db = true;
                    } else if (text.includes('ERROR')) {
                        dbStatus.className = 'status fail';
                        dbStatus.textContent = '❌ Database Error';
                        results.db = false;
                    } else {
                        dbStatus.className = 'status pass';
                        dbStatus.textContent = '✅ Database seems OK';
                        results.db = true;
                    }
                })
                .catch(e => {
                    log('dbLog', '✗ Error: ' + e.message + '\n');
                    dbStatus.className = 'status fail';
                    dbStatus.textContent = '❌ Connection Error: ' + e.message;
                    results.db = false;
                });
        }

        function testFormSubmit() {
            const formStatus = document.getElementById('formStatus');
            const formLog = document.getElementById('formLog');
            formStatus.style.display = 'block';
            formStatus.className = 'status loading';
            formStatus.textContent = 'Submitting form...';
            formLog.textContent = '';

            const name = document.getElementById('testSecName').value.trim();
            const sub = document.getElementById('testSubject').value.trim();
            const cat = document.getElementById('testCategory').value;

            log('formLog', '→ Field validation...\n');
            log('formLog', '  - Section Name: "' + name + '" (' + (name ? 'OK' : 'EMPTY') + ')\n');
            log('formLog', '  - Subject: "' + sub + '" (' + (sub ? 'OK' : 'EMPTY') + ')\n');
            log('formLog', '  - Category: "' + cat + '" (' + (cat ? 'OK' : 'EMPTY') + ')\n\n');

            if (!name || !sub || !cat) {
                formStatus.className = 'status fail';
                formStatus.textContent = '❌ Form Validation Failed - Fill all fields!';
                log('formLog', '✗ Validation failed - some fields empty!\n');
                return;
            }

            log('formLog', '→ Creating FormData...\n');
            const formData = new FormData();
            formData.append('action', 'saveSection');
            formData.append('sec_name', name);
            formData.append('sec_year', '1st Year');
            formData.append('sec_sub', sub);
            formData.append('sec_cat', cat);

            log('formLog', '→ Sending POST to api_section.php...\n');

            fetch('api_section.php', {
                method: 'POST',
                body: formData
            })
            .then(r => {
                log('formLog', '✓ HTTP Status: ' + r.status + '\n');
                return r.json();
            })
            .then(data => {
                log('formLog', '✓ Response: ' + JSON.stringify(data, null, 2) + '\n');
                if (data.success) {
                    formStatus.className = 'status pass';
                    formStatus.textContent = '✅ Form Submitted Successfully! - ' + data.message;
                } else {
                    formStatus.className = 'status fail';
                    formStatus.textContent = '❌ Form Rejected: ' + data.message;
                }
            })
            .catch(e => {
                log('formLog', '✗ Fetch Error: ' + e.message + '\n');
                formStatus.className = 'status fail';
                formStatus.textContent = '❌ Connection Error: ' + e.message;
            });
        }

        function runAllTests() {
            document.getElementById('apiLog').textContent = '';
            document.getElementById('dbLog').textContent = '';
            document.getElementById('formLog').textContent = '';
            document.getElementById('formStatus').style.display = 'none';

            testPHP();
            setTimeout(() => testAPI(), 500);
            setTimeout(() => testDB(), 1000);
            setTimeout(() => updateSummary(), 2000);
        }

        function updateSummary() {
            let summary = '<strong>Test Results:</strong><br>';
            summary += (results.php ? '✅' : '❌') + ' PHP Working<br>';
            summary += (results.api ? '✅' : '❌') + ' API Working<br>';
            summary += (results.db ? '✅' : '❌') + ' Database Connected<br><br>';

            if (results.php && results.api && results.db) {
                summary += '✅ <strong style="color: green; font-size: 1.2rem;">ALL SYSTEMS GO! Everything is working!</strong><br><br>';
                summary += 'Next: <a href="module1.html" style="font-weight: bold;">Go to Module 1</a> and test creating a section';
            } else {
                summary += '❌ <strong style="color: red;">Some tests failed - check above for details</strong>';
            }

            document.getElementById('summary').innerHTML = summary;
        }

        // Auto-run on page load
        window.onload = () => {
            runAllTests();
        };
    </script>
</body>
</html>
