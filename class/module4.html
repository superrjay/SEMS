<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Teacher Loading — SchedPro</title>
<link rel="stylesheet" href="assets/uikit/css/uikit.min.css">
<style>:root{--c1:#4a148c;--c2:#6a1b9a;--bg:#f4f6f9;--card:#fff;--border:#e8e8e8}
.schedule-row{cursor:pointer}</style>
<link rel="stylesheet" href="assets/custom.css">
</head>
<body>
<div id="alert-container"></div>

<div class="page-hd">
  <div>
    <h3>Teacher Loading</h3>
    <p>Assign instructors to sections and subjects.</p>
  </div>
</div>

<div class="uk-card uk-card-default" style="margin-bottom:20px">
  <div class="uk-card-header"><h5>Assign Instructor</h5></div>
  <div class="uk-card-body">
    <form class="uk-grid-small" uk-grid id="teacherForm">
      <div class="uk-width-1-2@m">
        <label class="uk-form-label">Select Section</label>
        <select class="uk-select" id="t_section">
          <option disabled selected>-- Select Section --</option>
        </select>
      </div>
      <div class="uk-width-1-2@m">
        <label class="uk-form-label">Instructor Name</label>
        <select class="uk-select" id="t_name">
          <option disabled selected>-- Select Instructor --</option>
        </select>
      </div>
      <div class="uk-width-1-1 uk-margin-small-top uk-flex" style="gap:10px" id="proceedContainer">
        <button type="button" class="uk-button uk-button-primary" onclick="assignTeacher()" style="height:42px;font-weight:700">
          <span uk-icon="icon:user;ratio:.85"></span> Assign Instructor
        </button>
        <button type="button" class="uk-button uk-button-default" onclick="window.location='module2.html'">
          Back to Timetable →
        </button>
      </div>
    </form>
  </div>
</div>

<div class="uk-card uk-card-default" style="margin-bottom:20px">
  <div class="uk-card-header uk-flex uk-flex-between uk-flex-middle">
    <h5>Faculty Loading Monitor</h5>
    <button id="viewAllTimetablesBtn" class="uk-button uk-button-default" style="height:34px;font-size:.78rem" type="button">
      <span uk-icon="icon:list;ratio:.8"></span> View All Timetables
    </button>
  </div>
  <div class="uk-card-body np">
    <table class="uk-table uk-table-hover uk-table-middle uk-table-divider">
      <thead>
        <tr>
          <th>Instructor</th>
          <th>Section &amp; Subject</th>
          <th>Schedule</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="teacherTableBody">
        <tr><td colspan="4" class="uk-text-center uk-text-muted" style="padding:24px">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="inlineTimetableArea"></div>

<script src="assets/uikit/js/uikit.min.js"></script>
    <script src="assets/app-offline.js"></script>
    <script>
        const API_URL = 'api_schedule.php';

        // predefined instructors by program
        const teacherOptions = {
            BSIT: [
                'Mr. Andrew Dela Cruz',
                'Mr. Aldrine De Guzman',
                'Ms. Daniella Agus',
                'Ms. Em Catulay',
                'Mr. Ashley Estrabo',
                'Ms. Grace Roca',
                'Mr. Jaylord Casin',
                'Ms. Trixie Ibanez',
                'Mr. Andy Dela Cruz'
            ],
            BSHM: [
                'Ms. Elena Moretti-Cruz',
                'Mr. Jonathan Sy',
                'Ms. Angela De Vera',
                'Ms. Trixie Ibanez',
                'Chef Maria Clarissa Santos',
                'Chef Rich Gonzales',
                'Mr. Fernando Gomez'
            ]
        };

        function updateTeacherList(program) {
            const sel = document.getElementById('t_name');
            sel.innerHTML = '<option disabled selected>-- Select Instructor --</option>';
            const list = teacherOptions[program] || [];
            list.forEach(name => {
                const o = document.createElement('option');
                o.value = name;
                o.textContent = name;
                sel.appendChild(o);
            });
        }

        window.onload = function() { 
            loadSectionsWithSchedules();
        };

        // Refresh options when a new section is created in Module 1
        window.addEventListener('storage', function(e) {
            if (e.key === 'sections_updated') {
                loadSectionsWithSchedules();
            }
        });

        function loadSectionsWithSchedules() {
            apiCall(API_URL + '?action=getSections', {timeout: 5000})
                .then(data => {
                    console.log('Module 4 - Primary sections (api_schedule):', data);
                    if (data && data.success && data.data && data.data.length > 0) {
                        populateTeacherList(data.data);
                        return;
                    }
                    console.log('Module 4 primary empty — trying fallback api_section.php');
                    return apiCall('api_section.php?action=getSections', {timeout: 5000}).then(fb => {
                        console.log('Module 4 - Fallback sections (api_section):', fb);
                        if (fb && fb.success && fb.data && fb.data.length > 0) {
                            populateTeacherList(fb.data);
                        } else {
                            // Try cache
                            try {
                                const cached = localStorage.getItem('api_cache_getSections');
                                if (cached) {
                                    const cacheData = JSON.parse(cached);
                                    if (Array.isArray(cacheData) && cacheData.length > 0) {
                                        populateTeacherList(cacheData);
                                        UIkit.notification({message: 'Using cached sections (offline mode)', status: 'info'});
                                        return;
                                    }
                                }
                            } catch (e) {
                                console.warn('Could not load cache', e);
                            }
                            UIkit.notification({message: 'No sections found. Create in Module 1.', status: 'warning'});
                        }
                    });
                })
                .catch(error => {
                    console.error('Error loading sections:', error);
                    // Try to load from cache
                    try {
                        const cached = localStorage.getItem('api_cache_getSections');
                        if (cached) {
                            const cacheData = JSON.parse(cached);
                            if (Array.isArray(cacheData) && cacheData.length > 0) {
                                populateTeacherList(cacheData);
                                UIkit.notification({message: 'Using cached sections (offline mode)', status: 'info'});
                                return;
                            }
                        }
                    } catch (e) {
                        console.warn('Could not load cache', e);
                    }
                    UIkit.notification({message: 'Could not load sections - using offline mode', status: 'warning'});
                });
        }

        

        function populateTeacherList(list) {
            const sel = document.getElementById('t_section');
            sel.innerHTML = '<option disabled selected>-- Select Section --</option>';
            const tableBody = document.getElementById('teacherTableBody');
            tableBody.innerHTML = "";
            list.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s.section_id; // robust id value
                opt.dataset.json = JSON.stringify(s);
                // compute program to make later lookup easier
                opt.dataset.program = s.section_code && s.section_code.startsWith('BSHM') ? 'BSHM' : 'BSIT';
                opt.text = `${s.section_code} - ${s.subject_name}`;
                sel.add(opt);

                const hasTeacher = (s.faculty_name && s.faculty_name !== null);
                const statusColor = hasTeacher ? "#2ecc71" : "#000000";
                const teacherName = hasTeacher ? s.faculty_name : "TBA";

                tableBody.innerHTML += `
                    <tr>
                        <td class="instructor-name">${teacherName}</td>
                        <td><b>${s.section_code}</b><br><small>${s.subject_name}</small></td>
                        <td>${s.schedule_days || 'TBA'}<br>${s.time_start || 'TBA'}</td>
                        <td style="color: ${statusColor}; font-weight: 700;">${hasTeacher ? 'LOADED' : 'PENDING'}</td>
                    </tr>`;
            });

            // attach change event to update teacher dropdown when a section is selected
            sel.addEventListener('change', function() {
                const program = this.options[this.selectedIndex].dataset.program;
                updateTeacherList(program);
            });
        }

        function assignTeacher() {
            const sel = document.getElementById('t_section');
            const selectedOption = sel.options[sel.selectedIndex];
            const section = selectedOption && selectedOption.dataset && selectedOption.dataset.json ? JSON.parse(selectedOption.dataset.json) : null;
            const teacherInput = document.getElementById('t_name').value.trim();
            const alertContainer = document.getElementById('alert-container');

            if(!section || !teacherInput) {
                UIkit.notification({message: 'Paki-pili ang Section at Instructor!', status: 'warning'});
                return;
            }

            // Add notification when save button is clicked (even before API response)
            const saveBtn = document.querySelector('.btn-blue');
            if (saveBtn) {
                saveBtn.addEventListener('click', function() {
                    UIkit.notification({message: 'Saving data...', status: 'primary'});
                });
            }

            // Client-side teacher conflict detection
            apiCall(API_URL + '?action=getSections', {timeout: 5000})
            .then(data => {
                if (data && data.success && Array.isArray(data.data)) {
                    const conflict = data.data.find(s => s.faculty_name === teacherInput && s.section_id !== section.section_id);
                    if (conflict) {
                        alertContainer.innerHTML = `
                            <div class="uk-alert-danger" uk-alert >
                                <p><strong>Instructor Conflict:</strong> Ang instructor na ito (<b>${teacherInput}</b>) ay naka-assign na sa section <b>${conflict.section_code}</b>. Paki-pili ng ibang instructor.</p>
                            </div>`;
                        UIkit.notification({message: 'Instructor conflict detected! Please choose another instructor.', status: 'danger'});
                        return;
                    }
                }
                // No conflict, proceed to save
                const formData = new FormData();
                formData.append('action', 'assignTeacher');
                formData.append('section_id', section.section_id);
                formData.append('faculty_name', teacherInput);

                apiCall(API_URL, {
                    method: 'POST',
                    body: formData,
                    timeout: 5000
                })
                .then(data => {
                    console.log('Teacher assignment response:', data);
                    if (data.success) {
                        alertContainer.innerHTML = "";
                        UIkit.notification({message: 'Instructor Assigned!', status: 'success'});
                        if (data.data && data.data.section_id) {
                            for (let i = 0; i < sel.options.length; i++) {
                                const opt = sel.options[i];
                                if (opt.value && parseInt(opt.value) === parseInt(data.data.section_id)) {
                                    opt.dataset.json = JSON.stringify(data.data);
                                    opt.text = `${data.data.section_code} - ${data.data.subject_name || ''}`;
                                    break;
                                }
                            }
                            const current = [];
                            for (let i = 0; i < sel.options.length; i++) {
                                const o = sel.options[i];
                                if (o.dataset && o.dataset.json) {
                                    try { current.push(JSON.parse(o.dataset.json)); } catch(e) {}
                                }
                            }
                            populateTeacherList(current);
                            loadSectionsWithSchedules();
                        } else {
                            loadSectionsWithSchedules();
                        }
                        document.getElementById('teacherForm').reset();
                    } else {
                        if (window.APP_OFFLINE) {
                            console.warn('API unavailable, saving teacher assignment locally');
                            saveSectionLocally({
                                section_id: section.section_id,
                                faculty_name: teacherInput,
                                section_code: section.section_code,
                                subject_name: section.subject_name
                            }, 'teachers');
                            UIkit.notification({message: 'Instructor saved locally (offline mode - will sync when online)', status: 'success'});
                            document.getElementById('teacherForm').reset();
                            loadSectionsWithSchedules();
                        } else {
                            UIkit.notification({message: 'Error: ' + data.message, status: 'danger'});
                        }
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    saveSectionLocally({
                        section_id: section.section_id,
                        faculty_name: teacherInput,
                        section_code: section.section_code,
                        subject_name: section.subject_name
                    }, 'teachers');
                    UIkit.notification({message: 'Instructor saved locally (offline mode - will sync when online)', status: 'success'});
                    document.getElementById('teacherForm').reset();
                    loadSectionsWithSchedules();
                });
            })
            .catch(error => {
                console.error('Error checking instructor conflicts:', error);
                UIkit.notification({message: 'Error checking instructor conflicts. Please try again.', status: 'danger'});
            });
        }

        const viewAllBtn = document.getElementById('viewAllTimetablesBtn');
        if (viewAllBtn) {
            viewAllBtn.disabled = false;
            viewAllBtn.classList.remove('uk-button-disabled');
            viewAllBtn.style.opacity = '1';
            viewAllBtn.style.pointerEvents = 'auto';
            viewAllBtn.tabIndex = 0;
            viewAllBtn.addEventListener('click', function() {
                loadAllClassTimetablesInline();
            });
        }
        function loadAllClassTimetablesInline() {
            const container = document.getElementById('inlineTimetableArea');
            container.innerHTML = '<div class="uk-text-center uk-text-muted uk-padding">Loading timetable...</div>';
            fetch(API_URL + '?action=getScheduleAll')
                .then(response => response.json())
                .then(data => {
                    if (data && data.success && Array.isArray(data.data) && data.data.length > 0) {
                        let html = `<table class='uk-table uk-table-divider uk-table-striped uk-table-hover'>
                    <thead>
                        <tr>
                            <th>SECTION</th>
                            <th>YEAR LEVEL</th>
                            <th>SUBJECT</th>
                            <th>ROOM</th>
                            <th>TEACHER</th>
                            <th>DAY</th>
                            <th>START TIME</th>
                            <th>END TIME</th>
                        </tr>
                    </thead>
                    <tbody>`;
                        data.data.forEach(row => {
                            html += `
                        <tr class='schedule-row' data-id='${row.schedule_id}' data-section='${row.section_code||""}' data-year='${row.year_level||""}' data-subject='${row.subject_name||""}' data-room='${row.room_number||""}' data-teacher='${row.faculty_name||""}' data-day='${row.schedule_day||row.schedule_days||row.day||""}' data-start='${row.time_start||""}' data-end='${row.time_end||""}'>
                            <td><span class='uk-label'>${row.section_code || ''}</span></td>
                            <td>${row.year_level || ''}</td>
                            <td>${row.subject_name || ''}</td>
                            <td>${row.room_number || ''}</td>
                            <td>${row.faculty_name || ''}</td>
                            <td>${row.schedule_day || row.schedule_days || row.day || ''}</td>
                            <td>${row.time_start || ''}</td>
                            <td>${row.time_end || ''}</td>
                        </tr>`;
                        });
                        html += '</tbody></table>';
                        container.innerHTML = html;

                        // make rows clickable to view details
                        container.querySelectorAll('.schedule-row').forEach(tr => {
                            tr.addEventListener('click', () => {
                                const details = {
                                    section: tr.dataset.section,
                                    year: tr.dataset.year,
                                    subject: tr.dataset.subject,
                                    room: tr.dataset.room,
                                    teacher: tr.dataset.teacher,
                                    day: tr.dataset.day,
                                    start: tr.dataset.start,
                                    end: tr.dataset.end
                                };
                                const text = Object.entries(details).map(([k,v])=>`${k}: ${v}`).join('\n');
                                if (window.UIkit && UIkit.modal) {
                                    UIkit.modal.alert(text);
                                } else {
                                    alert(text);
                                }
                            });
                        });
                    } else {
                        container.innerHTML = '<div class="uk-text-center uk-text-muted uk-padding">No timetable data found.</div>';
                    }
                })
                .catch(err => {
                    container.innerHTML = '<div class="uk-text-center uk-text-danger uk-padding">Error loading timetable.</div>';
                });
        }
    </script>
</body>
</html>
