<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Conflict Detection — SchedPro</title>
<link rel="stylesheet" href="assets/uikit/css/uikit.min.css">
<style>:root{--c1:#4a148c;--c2:#6a1b9a;--bg:#f4f6f9;--card:#fff;--border:#e8e8e8}</style>
<link rel="stylesheet" href="assets/custom.css">
</head>
<body>

<div class="page-hd">
  <div>
    <h3>Conflict Detection</h3>
    <p>Scan the database for scheduling conflicts and overlaps.</p>
  </div>
</div>

<div class="db-info uk-flex uk-flex-middle" style="gap:8px;margin-bottom:20px">
  <span uk-icon="icon:database;ratio:.9" style="color:var(--c1)"></span>
  Connected to: <b>enrollment_system</b> &nbsp;|&nbsp; Table: <b>sections</b>
</div>

<div class="uk-card uk-card-default" style="margin-bottom:20px">
  <div class="uk-card-header uk-flex uk-flex-between uk-flex-middle">
    <h5>System Audit</h5>
    <button class="uk-button uk-button-primary" onclick="runSystemAudit()" style="height:34px;font-size:.78rem;font-weight:600">
      <span uk-icon="icon:search;ratio:.8"></span> Run Final Audit
    </button>
  </div>
  <div class="uk-card-body">
    <div id="scanResults" class="uk-text-center uk-text-muted" style="padding:24px 0;font-size:.85rem">
      Ready to audit the centralized database.
    </div>
  </div>
</div>

<script src="assets/uikit/js/uikit.min.js"></script>
    <script src="assets/uikit/js/uikit-icons.min.js"></script>
    <script src="assets/app-offline.js"></script>
    <script>
        const API_URL = 'api_schedule.php';

        async function runSystemAudit() {
            const results = document.getElementById('scanResults');
            
            // Step 1: Loading State
            results.innerHTML = `
                <div class='uk-text-center uk-padding'>
                    <div uk-spinner='ratio: 1.5'></div>
                    <p class="uk-margin-small-top">Fetching live data from SQL Database...</p>
                </div>`;

            try {
                // Step 2: Fetch all sections from database with offline fallback
                const schedules = await apiCall(API_URL + '?action=getSections', {timeout: 5000});

                console.log('Module 5 - Audit data:', schedules);

                if(!schedules.success || !schedules.data) {
                    // Try to load from cache if offline
                    try {
                        const cached = localStorage.getItem('api_cache_getSections');
                        if (cached) {
                            const cacheData = JSON.parse(cached);
                            if (Array.isArray(cacheData) && cacheData.length > 0) {
                                results.innerHTML = `
                                    <div class='uk-alert-warning' uk-alert>
                                        <p><strong>OFFLINE MODE:</strong> Using cached data for audit.</p>
                                    </div>`;
                                schedules.success = true;
                                schedules.data = cacheData;
                            } else {
                                results.innerHTML = "<div class='uk-alert-warning' uk-alert>No active schedules found.</div>";
                                return;
                            }
                        } else {
                            results.innerHTML = "<div class='uk-alert-warning' uk-alert>No active schedules found in the database.</div>";
                            return;
                        }
                    } catch (e) {
                        results.innerHTML = "<div class='uk-alert-warning' uk-alert>No active schedules found in the database.</div>";
                        return;
                    }
                }

                let foundConflicts = [];
                const sections = schedules.data;

                // Helpers: normalize days and times
                function parseDays(raw) {
                    if (!raw) return [];
                    return raw.toString().split(/[;,\|\/]+|\s*,\s*/).map(d => d.trim().toLowerCase()).filter(Boolean);
                }

                function toMinutes(t) {
                    if (!t) return null;
                    // Accept HH:MM or HH:MM:SS
                    const parts = t.split(':').map(p => parseInt(p,10));
                    if (parts.length >= 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                        return parts[0]*60 + parts[1];
                    }
                    return null;
                }

                function rangesOverlap(aStart, aEnd, bStart, bEnd) {
                    if (aStart === null || bStart === null) return false;
                    // if end missing assume 60-minute duration
                    if (aEnd === null) aEnd = aStart + 60;
                    if (bEnd === null) bEnd = bStart + 60;
                    return (aStart < bEnd) && (bStart < aEnd);
                }

                // Build normalized section entries for easier comparisons
                const norm = sections.map(s => {
                    return {
                        section_id: s.section_id,
                        section_code: s.section_code,
                        subject_name: s.subject_name,
                        room_number: s.room_number || null,
                        days: parseDays(s.schedule_days),
                        time_start_min: toMinutes(s.time_start),
                        time_end_min: toMinutes(s.time_end),
                        faculty_name: (s.faculty_name && s.faculty_name !== 'NULL') ? s.faculty_name : ((s.first_name||s.last_name) ? `${s.first_name||''} ${s.last_name||''}`.trim() : null)
                    };
                });

                const conflictKeys = new Set();
                for (let i = 0; i < norm.length; i++) {
                    for (let j = i + 1; j < norm.length; j++) {
                        const a = norm[i];
                        const b = norm[j];

                        // require at least one common day
                        const commonDays = a.days.filter(d => b.days.includes(d));
                        if (commonDays.length === 0) continue;

                        // check time overlap
                        if (!rangesOverlap(a.time_start_min, a.time_end_min, b.time_start_min, b.time_end_min)) continue;

                        // ROOM CONFLICT
                        if (a.room_number && b.room_number && a.room_number === b.room_number) {
                            const key = `room|${a.room_number}|${a.time_start_min}|${b.time_start_min}|${a.section_id}|${b.section_id}`;
                            if (!conflictKeys.has(key)) {
                                conflictKeys.add(key);
                                foundConflicts.push({
                                    type: "ROOM CONFLICT",
                                    msg: `<b>Critical Error:</b> Room <b>${a.room_number}</b> is double-booked for <b>${a.section_code}</b> and <b>${b.section_code}</b>.`,
                                    time: `${commonDays.join(', ')} | ${safelyFormatTime(a.time_start_min)}`
                                });
                            }
                        }

                        // FACULTY OVERLAP
                        if (a.faculty_name && b.faculty_name) {
                            const an = a.faculty_name.toLowerCase();
                            const bn = b.faculty_name.toLowerCase();
                            if (an === bn) {
                                const key = `fac|${an}|${a.time_start_min}|${b.time_start_min}|${a.section_id}|${b.section_id}`;
                                if (!conflictKeys.has(key)) {
                                    conflictKeys.add(key);
                                    foundConflicts.push({
                                        type: "FACULTY OVERLAP",
                                        msg: `<b>Critical Error:</b> Instructor <b>${a.faculty_name}</b> has overlapping classes in sections <b>${a.section_code}</b> and <b>${b.section_code}</b>.`,
                                        time: `${commonDays.join(', ')} | ${safelyFormatTime(a.time_start_min)}`
                                    });
                                }
                            }
                        }
                    }
                }

                // helper to display minutes as HH:MM
                function safelyFormatTime(min) {
                    if (min === null || isNaN(min)) return 'TBA';
                    const h = Math.floor(min/60).toString().padStart(2,'0');
                    const m = (min%60).toString().padStart(2,'0');
                    return `${h}:${m}`;
                }

                // Step 4: Display Results
                results.innerHTML = "";
                if (foundConflicts.length > 0) {
                    foundConflicts.forEach(c => {
                        results.innerHTML += `
                            <div class="conflict-card uk-animation-slide-bottom-small">
                                <span class="badge-error">${c.type}</span>
                                <h4 style="margin: 10px 0 5px 0; font-weight: 800; color: #c0392b;">Audit Finding: Illegal Entry</h4>
                                <p style="margin: 0; color: #2c3e50;">${c.msg}</p>
                                <div class="uk-margin-small-top">
                                    <span class="uk-text-bold" style="font-size: 0.85rem;">Schedule: ${c.time}</span>
                                </div>
                            </div>`;
                    });
                } else {
                    results.innerHTML = `
                        <div class="no-conflict uk-animation-scale-up">
                            <span uk-icon="icon: check; ratio: 2"></span>
                            <h3 style="font-weight: 800; margin-bottom: 0;">DATABASE AUDIT COMPLETE</h3>
                            <p>No conflicts detected in current enrollment sections.</p>
                        </div>`;
                }

            } catch (error) {
                console.error('Error:', error);
                results.innerHTML = `
                    <div class="uk-alert-danger" uk-alert>
                        <p><b>Connection Error:</b> ${error.message}. System is in offline mode.</p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
