<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchedPro - Scheduling System</title>
    <link rel="stylesheet" href="assets/uikit/css/uikit.min.css" />
    <style>
        body { 
            padding: 40px 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 50px; color: white; }
        .header h1 { font-size: 3rem; font-weight: 800; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 1.2rem; margin: 10px 0 0 0; opacity: 0.95; }
        
        .modules-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .module-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }
        
        .module-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .module-icon { 
            font-size: 3rem; 
            margin-bottom: 15px;
            text-align: center;
        }
        
        .module-title { 
            font-size: 1.5rem; 
            font-weight: 800; 
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .module-description { 
            color: #666; 
            margin-bottom: 20px; 
            flex-grow: 1;
        }
        
        .module-status { 
            display: inline-block;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-top: auto;
        }
        
        .status-ready { background: #d5f4e6; color: #27ae60; }
        .status-warning { background: #fff3cd; color: #856404; }
        
        .info-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            color: #2c3e50;
        }
        
        .info-section h2 { color: #667eea; font-weight: 800; margin-top: 0; }
        
        .quick-links { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px; }
        .quick-links a {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        
        .quick-links a:hover { background: #764ba2; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 SchedPro</h1>
            <p>School Scheduling & Enrollment System</p>
        </div>

        <div class="modules-grid">
            <!-- Module 1 -->
            <a href="module1.html" class="module-card" style="border-top: 5px solid #8e44ad;">
                <div class="module-icon">📝</div>
                <div class="module-title">Module 1</div>
                <div class="module-description">Section Creation & Assignment</div>
                <div class="module-status status-ready">✓ Ready</div>
            </a>

            <!-- Module 2 -->
            <a href="module2.html" class="module-card" style="border-top: 5px solid #2ecc71;">
                <div class="module-icon">🕐</div>
                <div class="module-title">Module 2</div>
                <div class="module-description">Class Timetable Generation</div>
                <div class="module-status status-ready">✓ Ready</div>
            </a>

            <!-- Module 3 -->
            <a href="module3.html" class="module-card" style="border-top: 5px solid #e74c3c;">
                <div class="module-icon">🏢</div>
                <div class="module-title">Module 3</div>
                <div class="module-description">Room Assignment & Validation</div>
                <div class="module-status status-ready">✓ Ready</div>
            </a>

            <!-- Module 4 -->
            <a href="module4.html" class="module-card" style="border-top: 5px solid #f39c12;">
                <div class="module-icon">👨‍🏫</div>
                <div class="module-title">Module 4</div>
                <div class="module-description">Teacher Loading Management</div>
                <div class="module-status status-ready">✓ Ready</div>
            </a>

            <!-- Module 5 -->
            <a href="module5.html" class="module-card" style="border-top: 5px solid #9b59b6;">
                <div class="module-icon">🔍</div>
                <div class="module-title">Module 5</div>
                <div class="module-description">System Conflict Scanner</div>
                <div class="module-status status-ready">✓ Ready</div>
            </a>
        </div>

    </div>

    <script src="assets/uikit/js/uikit.min.js"></script>
    <script>
        // Check database connection on page load
        fetch('api_section.php?action=getSections')
            .then(r => r.json())
            .then(d => {
                const statusDiv = document.getElementById('dbStatus');
                const statusText = document.getElementById('dbStatusText');
                statusDiv.style.display = 'block';
                statusDiv.style.background = '#d5f4e6';
                statusText.innerHTML = '✅ <strong style="color: green;">Database Connected!</strong> All systems operational.';
                console.log('Database connection successful', d);
            })
            .catch(e => {
                const statusDiv = document.getElementById('dbStatus');
                const statusText = document.getElementById('dbStatusText');
                statusDiv.style.display = 'block';
                statusDiv.style.background = '#f8d7da';
                statusText.innerHTML = '❌ <strong style="color: red;">Database NOT connected!</strong> Please start XAMPP (Apache & MySQL must be GREEN)';
                console.error('Database connection failed:', e);
            });
    </script>
</body>
</html>
