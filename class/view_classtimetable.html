<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>View Class Timetable — SchedPro</title>
<link rel="stylesheet" href="assets/uikit/css/uikit.min.css">
<style>:root{--c1:#4a148c;--c2:#6a1b9a;--bg:#f4f6f9;--card:#fff;--border:#e8e8e8}
.schedule-row{cursor:pointer}
.uk-label{background:var(--c1);color:#fff;border-radius:20px;font-size:.68rem;padding:3px 10px;font-weight:600}</style>
<link rel="stylesheet" href="assets/custom.css">
</head>
<body>

<div class="page-hd">
  <div>
    <h3>All Class Timetables</h3>
    <p>Complete view of all scheduled sections.</p>
  </div>
  <button class="uk-button uk-button-default" onclick="loadClassTimetable()" style="height:38px;font-size:.82rem">
    <span uk-icon="icon:refresh;ratio:.85"></span> Refresh
  </button>
</div>

<div class="uk-card uk-card-default">
  <div class="uk-card-body np" style="overflow-x:auto">
    <table class="uk-table uk-table-hover uk-table-middle uk-table-divider">
      <thead>
        <tr>
          <th>Section</th>
          <th>Year Level</th>
          <th>Subject</th>
          <th>Room</th>
          <th>Teacher</th>
          <th>Day</th>
          <th>Start</th>
          <th>End</th>
        </tr>
      </thead>
      <tbody id="classTimetableBody">
        <tr><td colspan="8" class="uk-text-center uk-text-muted" style="padding:24px">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="assets/uikit/js/uikit.min.js"></script>
    <script src="assets/app-offline.js"></script>
    <script>
        const API_URL = 'api_schedule.php';
        window.onload = function() {
            loadClassTimetable();
        };
        function loadClassTimetable() {
            fetch(API_URL + '?action=getScheduleAll')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('classTimetableBody');
                    tbody.innerHTML = '';
                    if (data && data.success && Array.isArray(data.data) && data.data.length > 0) {
                        // helper to guess year from section code (e.g. BSIT 2120 -> 2nd Year)
                        function guessYear(code) {
                            if (!code) return '';
                            const m = code.match(/\b(\d)/);
                            if (!m) return '';
                            const d = parseInt(m[1],10);
                            if (isNaN(d)) return '';
                            switch(d) {
                                case 1: return '1st Year';
                                case 2: return '2nd Year';
                                case 3: return '3rd Year';
                                case 4: return '4th Year';
                                default: return d+'th Year';
                            }
                        }
                        data.data.forEach(row => {
                            const yearDisplay = row.year_level || guessYear(row.section_code);
                            tbody.innerHTML += `
                                <tr class="schedule-row" data-section="${row.section_code||''}" data-year="${yearDisplay||''}" data-subject="${row.subject_name||''}" data-room="${row.room_number||''}" data-teacher="${row.faculty_name||''}" data-day="${row.schedule_day||row.schedule_days||row.day||''}" data-start="${row.time_start||''}" data-end="${row.time_end||''}">
                                    <td><span class="uk-label">${row.section_code || ''}</span></td>
                                    <td>${yearDisplay || ''}</td>
                                    <td>${row.subject_name || ''}</td>
                                    <td>${row.room_number || ''}</td>
                                    <td>${row.faculty_name || ''}</td>
                                    <td>${row.schedule_day || row.schedule_days || row.day || ''}</td>
                                    <td>${row.time_start || ''}</td>
                                    <td>${row.time_end || ''}</td>
                                </tr>
                            `;
                        });
                    } else {
                        // If no schedule data, fallback to sections table
                        fetch(API_URL + '?action=getSections')
                            .then(response => response.json())
                            .then(secData => {
                                if (secData && secData.success && Array.isArray(secData.data) && secData.data.length > 0) {
                                    // same guessYear helper from above
                                    function guessYear(code) {
                                        if (!code) return '';
                                        const m = code.match(/\b(\d)/);
                                        if (!m) return '';
                                        const d = parseInt(m[1],10);
                                        if (isNaN(d)) return '';
                                        switch(d) {
                                            case 1: return '1st Year';
                                            case 2: return '2nd Year';
                                            case 3: return '3rd Year';
                                            case 4: return '4th Year';
                                            default: return d+'th Year';
                                        }
                                    }
                                    secData.data.forEach(row => {
                                        const yearDisplay = row.year_level || guessYear(row.section_code);
                                        tbody.innerHTML += `
                                            <tr class="schedule-row" data-section="${row.section_code||''}" data-year="${yearDisplay||''}" data-subject="${row.subject_name||''}" data-room="${row.room_number||''}" data-teacher="${row.faculty_name||''}" data-day="${row.schedule_days||''}" data-start="${row.time_start||''}" data-end="${row.time_end||''}">
                                                <td><span class="uk-label">${row.section_code || ''}</span></td>
                                                <td>${yearDisplay || ''}</td>
                                                <td>${row.subject_name || ''}</td>
                                                <td>${row.room_number || ''}</td>
                                                <td>${row.faculty_name || ''}</td>
                                                <td>${row.schedule_days || ''}</td>
                                                <td>${row.time_start || ''}</td>
                                                <td>${row.time_end || ''}</td>
                                            </tr>
                                        `;
                                    });
                                } else {
                                    tbody.innerHTML = '<tr><td colspan="8">No timetable data found.</td></tr>';
                                }
                            })
                            .catch(err => {
                                tbody.innerHTML = '<tr><td colspan="8">Error loading timetable.</td></tr>';
                            });
                    }
                    // make any inserted rows clickable
                    tbody.querySelectorAll('.schedule-row').forEach(tr => {
                        tr.addEventListener('click', () => {
                            const details = {
                                section: tr.dataset.section,
                                year: tr.dataset.year,
                                subject: tr.dataset.subject,
                                room: tr.dataset.room,
                                teacher: tr.dataset.teacher,
                                day: tr.dataset.day,
                                start: tr.dataset.start,
                                end: tr.dataset.end
                            };
                            const text = Object.entries(details).map(([k,v])=>`${k}: ${v}`).join('\n');
                            if (window.UIkit && UIkit.modal) {
                                UIkit.modal.alert(text);
                            } else {
                                alert(text);
                            }
                        });
                    });
                })
                .catch(err => {
                    const tbody = document.getElementById('classTimetableBody');
                    tbody.innerHTML = '<tr><td colspan="8">Error loading timetable.</td></tr>';
                });
        }
    </script>
</body>
</html>
