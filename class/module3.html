<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Room Assignment — SchedPro</title>
<link rel="stylesheet" href="assets/uikit/css/uikit.min.css">
<style>:root{--c1:#4a148c;--c2:#6a1b9a;--bg:#f4f6f9;--card:#fff;--border:#e8e8e8}
#rm_section option{white-space:pre-line}</style>
<link rel="stylesheet" href="assets/custom.css">
</head>
<body>
<div id="alert-container"></div>

<div class="page-hd">
  <div>
    <h3>Room Assignment</h3>
    <p>Assign classrooms to plotted sections.</p>
  </div>
</div>

<div class="uk-card uk-card-default" style="margin-bottom:20px">
  <div class="uk-card-header"><h5>Assign Room</h5></div>
  <div class="uk-card-body">
    <form class="uk-grid-small" uk-grid id="roomForm">
      <div class="uk-width-1-2@m">
        <label class="uk-form-label">Select Plotted Section</label>
        <select class="uk-select" id="rm_section">
          <option disabled selected>-- Select Section --</option>
        </select>
      </div>
      <div class="uk-width-1-2@m">
        <label class="uk-form-label">Room</label>
        <select class="uk-select" id="rm_name">
          <option value="" disabled selected>-- Select Room --</option>
        </select>
      </div>
      <div class="uk-width-1-1 uk-margin-small-top uk-flex" style="gap:10px">
        <button type="button" class="uk-button uk-button-primary" onclick="assignRoom()" style="height:42px;font-weight:700">
          <span uk-icon="icon:check;ratio:.85"></span> Validate &amp; Save Room
        </button>
        <button type="button" class="uk-button uk-button-default" onclick="proceedModule4()">
          Proceed to Teacher Loading →
        </button>
      </div>
    </form>
  </div>
</div>

<div class="uk-card uk-card-default">
  <div class="uk-card-header"><h5>Current Room Status</h5></div>
  <div class="uk-card-body np">
    <table class="uk-table uk-table-hover uk-table-middle uk-table-divider">
      <thead>
        <tr>
          <th>Section</th>
          <th>Max Students</th>
          <th>Room</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="roomTableBody">
        <tr><td colspan="4" class="uk-text-center uk-text-muted" style="padding:24px">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="assets/uikit/js/uikit.min.js"></script>
    <script src="assets/app-offline.js"></script>
    <script>
        const API_URL = 'api_schedule.php';

        window.onload = function() {
            loadSectionsWithSchedules();
        };

        // Reload sections if Module 1 created a new section (storage event)
        window.addEventListener('storage', function(e) {
            if (e.key === 'sections_updated') {
                loadSectionsWithSchedules();
            }
        });

        // room lists will be populated dynamically from the database
        // default rooms for assignment: provided program-specific floors, lecture and specialized rooms
        const roomOptions = {
            BSIT: [
                // 2nd Floor
                ['RM 202','RM 202 '],
                ['RM 203','RM 203 '],
                ['RM 204','RM 204 '],
                ['RM 205','RM 205 '],
                ['RM 206 COMLAB 1','RM 206 COMLAB 1'],
                // 3rd Floor
                ['RM 301','RM 301 '],
                ['RM 302','RM 302 '],
                ['RM 303','RM 303 '],
                ['RM 304','RM 304 '],
                ['RM 305','RM 305 '],
                ['RM 306','RM 306  '],
                ['RM 307 COMLAB 2','RM 307 COMLAB 2'],
                ['RM 308 COMLAB 3','RM 308 COMLAB 3'],
                // 4th Floor
                ['RM 401','RM 401 '],
                ['RM 402','RM 402 '],
                ['RM 403','RM 403 '],
                ['RM 404','RM 404 '],
                ['RM 405','RM 405 '],
                ['RM 406 COMLAB 4','RM 406 COMLAB 4']
            ],
            BSHM: [
                // 2nd Floor
                ['RM 211','RM 211 '],
                ['RM 212','RM 212 '],
                ['RM 213','RM 213 '],
                ['RM 214','RM 214 '],
                ['RM 215','RM 215 '],
                ['RM 216 LABORATORY 1 (Kitchen)','RM 216 LABORATORY 1 (Kitchen)'],
                // 3rd Floor
                ['RM 311','RM 311 '],
                ['RM 312','RM 312 '],
                ['RM 313','RM 313 '],
                ['RM 314','RM 314 '],
                ['RM 315','RM 315 '],
                ['RM 316','RM 316'],
                ['RM 317 LABORATORY 2 (Bar)','RM 317 LABORATORY 2 (Bar)'],
                ['RM 318 LABORATORY 3 (Baking)','RM 318 LABORATORY 3 (Baking)'],
                // 4th Floor
                ['RM 411','RM 411 '],
                ['RM 412','RM 412 '],
                ['RM 413','RM 413 '],
                ['RM 414','RM 414 '],
                ['RM 415','RM 415 '],
                ['RM 416 LABORATORY 4 (Mock Hotel)','RM 416 LABORATORY 4 (Mock Hotel)']
            ]
        };
        const MAX_STUDENTS = 20;

        function loadSectionsWithSchedules() {
            console.log('Module 3: loadSectionsWithSchedules called');
            apiCall(API_URL + '?action=getSections', {timeout: 5000})
                .then(data => {
                    console.log('Module 3 - Primary sections (api_schedule):', data);
                    if (data && data.success && data.data && data.data.length > 0) {
                        console.log('Module 3: Got', data.data.length, 'sections from api_schedule');
                        populateRoomList(data.data);
                        return;
                    }
                    console.log('Module 3 primary empty — trying fallback api_section.php');
                    return apiCall('api_section.php?action=getSections', {timeout: 5000}).then(fb => {
                        console.log('Module 3 - Fallback sections (api_section):', fb);
                        if (fb && fb.success && fb.data && fb.data.length > 0) {
                            console.log('Module 3: Got', fb.data.length, 'sections from api_section');
                            populateRoomList(fb.data);
                        } else {
                            // Try cache if both APIs fail
                            console.log('Module 3: Both APIs failed, trying cache');
                            try {
                                const cached = localStorage.getItem('api_cache_getSections');
                                if (cached) {
                                    const cacheData = JSON.parse(cached);
                                    if (Array.isArray(cacheData) && cacheData.length > 0) {
                                        console.log('Module 3: Got', cacheData.length, 'sections from cache');
                                        populateRoomList(cacheData);
                                        UIkit.notification({message: 'Using cached sections (offline mode)', status: 'info'});
                                        return;
                                    }
                                }
                            } catch (e) {
                                console.warn('Could not load cache', e);
                            }
                            console.log('Module 3: No sections found at all');
                            UIkit.notification({message: 'No sections found. Create in Module 1.', status: 'warning'});
                        }
                    });
                })
                .catch(error => {
                    console.error('Error loading sections:', error);
                    // Try to load from cache on error
                    try {
                        const cached = localStorage.getItem('api_cache_getSections');
                        if (cached) {
                            const cacheData = JSON.parse(cached);
                            if (Array.isArray(cacheData) && cacheData.length > 0) {
                                console.log('Module 3: Error caught, using cache with', cacheData.length, 'sections');
                                populateRoomList(cacheData);
                                UIkit.notification({message: 'Using cached sections (offline mode)', status: 'info'});
                                return;
                            }
                        }
                    } catch (e) {
                        console.warn('Could not load cache', e);
                    }
                    console.log('Module 3: No cache available either');
                    UIkit.notification({message: 'Could not load sections - using offline mode', status: 'warning'});
                });
        }

        function populateRoomList(list) {
            const sel = document.getElementById('rm_section');
            sel.innerHTML = '<option disabled selected>-- Select Section --</option>';
            const tableBody = document.getElementById('roomTableBody');
            tableBody.innerHTML = "";
            let lastCreatedSectionId = null;
            let lastCreated = null;
            try {
                lastCreated = localStorage.getItem('lastCreatedSection');
            } catch (e) {}

            // Group by section_code
            const grouped = {};
            list.forEach(s => {
                const code = s.section_code;
                if (!grouped[code]) {
                    grouped[code] = {
                        section_code: code,
                        section_ids: [],
                        subject_names: [],
                        room_number: s.room_number,
                        student_count: 0,
                        all_sections: [],
                    };
                }
                grouped[code].section_ids.push(s.section_id);
                if (s.subject_name && !grouped[code].subject_names.includes(s.subject_name)) {
                    grouped[code].subject_names.push(s.subject_name);
                }
                grouped[code].all_sections.push(s);
                if (s.student_count) grouped[code].student_count += s.student_count;
                if (s.room_number && !grouped[code].room_number) grouped[code].room_number = s.room_number;
            });

            // Show all sections in the table, even those without room
            Object.values(grouped).forEach(g => {
                // Compose display string for subjects (all names collected when grouping)
                const flat = [];
                g.subject_names.forEach(n => {
                    if (typeof n === 'string' && n.includes('|')) {
                        n.split('|').forEach(p => flat.push(p.trim()));
                    } else {
                        flat.push(n);
                    }
                });
                const subjDisplay = flat.map(n => `"${n}"`).join('\n');
                // Use the first section_id for the option value
                let opt = document.createElement('option');
                opt.value = g.section_ids[0];
                opt.dataset.json = JSON.stringify(g);
                opt.text = `${g.section_code} - ${subjDisplay}`;
                sel.add(opt);
                // auto-select if this is the last created section
                const sectionCodeTrim = String(g.section_code || '').trim().toUpperCase();
                const lastCreatedTrim = String(lastCreated || '').trim().toUpperCase();
                if (lastCreatedTrim && sectionCodeTrim === lastCreatedTrim) {
                    lastCreatedSectionId = g.section_ids[0];
                }
                // Show in table (one row per section_code)
                // Use first room_number found, or blank if none
                const roomDisplay = g.room_number && String(g.room_number).trim().length > 0 ? g.room_number : '';
                // Always show MAX STUDENTS as 50
                const maxStudents = 50;
                // Status: ACTIVE if room assigned, else NOT ACTIVE
                const isAssigned = roomDisplay.length > 0;
                const statusLabel = isAssigned ? 'ACTIVE' : 'NOT ACTIVE';
                const statusColor = isAssigned ? '#2ecc71' : '#e74c3c';
                tableBody.innerHTML += `
                    <tr>
                        <td style="text-align:center;"><span class="uk-label" style="background:var(--c1); border-radius:4px;">${g.section_code}</span></td>
                        <td style="text-align:center; font-weight:700; vertical-align:middle;">${maxStudents}</td>
                        <td style="text-align:center; font-weight:700; vertical-align:middle;">${roomDisplay}</td>
                        <td style="text-align:center; color: ${statusColor}; font-weight: 700; vertical-align:middle;">● ${statusLabel}</td>
                    </tr>`;
            });

            if (lastCreatedSectionId) {
                sel.value = lastCreatedSectionId;
                const opt = sel.options[sel.selectedIndex];
                const section = opt && opt.dataset && opt.dataset.json ? JSON.parse(opt.dataset.json) : null;
                populateRoomDropdown(section);
                try { localStorage.removeItem('lastCreatedSection'); } catch (e) {}
            }
            sel.addEventListener('change', () => {
                const opt = sel.options[sel.selectedIndex];
                const section = opt && opt.dataset && opt.dataset.json ? JSON.parse(opt.dataset.json) : null;
                populateRoomDropdown(section);
            });
            if (sel.value) {
                const opt = sel.options[sel.selectedIndex];
                const section = opt && opt.dataset && opt.dataset.json ? JSON.parse(opt.dataset.json) : null;
                populateRoomDropdown(section);
            }
        }

        // helper: fill room select based on section data
        function populateRoomDropdown(section) {
            const sel = document.getElementById('rm_name');
            sel.innerHTML = '<option value="" disabled selected>-- Select Room --</option>';
            if (!section) return;
            // decide program by section_code prefix
            const code = section.section_code || '';
            let program = null;
            if (code.startsWith('BSHM')) {
                program = 'BSHM';
            } else {
                program = 'BSIT';
            }
            const rooms = roomOptions[program] || [];
            rooms.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r[0];
                opt.text = r[1];
                sel.add(opt);
            });
            // if section has existing room, try to select it
            if (section.room_number) {
                sel.value = section.room_number;
            }
        }

        function proceedModule4() {
            if (window.parent && typeof window.parent.loadModule === 'function') {
                window.parent.loadModule('module4.html');
            }
        }

        function assignRoom() {
            const sectionVal = document.getElementById('rm_section').value;
            const roomName = document.getElementById('rm_name').value.trim();
            const alertContainer = document.getElementById('alert-container');

            if(!sectionVal || !roomName) {
                UIkit.notification({message: 'Paki-pili ang Section at Room!', status: 'warning'});
                return;
            }

            const section_id = parseInt(sectionVal);

            // Client-side room conflict detection
            apiCall(API_URL + '?action=getSections', {timeout: 5000})
            .then(data => {
                if (data && data.success && Array.isArray(data.data)) {
                    const conflict = data.data.find(s => s.room_number === roomName && s.section_id !== section_id);
                    if (conflict) {
                        alertContainer.innerHTML = `
                            <div class="uk-alert-danger" uk-alert >
                                <p><strong>Room Conflict:</strong> Ang room na ito (<b>${roomName}</b>) ay naka-assign na sa section <b>${conflict.section_code}</b>. Paki-pili ng ibang room.</p>
                            </div>`;
                        UIkit.notification({message: 'Room conflict detected! Please choose another room.', status: 'danger'});
                        return;
                    }
                }
                // No conflict, proceed to save
                const formData = new FormData();
                formData.append('action', 'assignRoom');
                formData.append('section_id', section_id);
                formData.append('room_number', roomName);

                apiCall(API_URL, {
                    method: 'POST',
                    body: formData,
                    timeout: 5000
                })
                .then(data => {
                    console.log('Room assignment response:', data);
                    if (data.success) {
                        alertContainer.innerHTML = "";
                        UIkit.notification({message: 'Room Assigned Successfully!', status: 'success'});
                        loadSectionsWithSchedules();
                        document.getElementById('roomForm').reset();
                    } else {
                        if (window.APP_OFFLINE) {
                            console.warn('API unavailable, saving room assignment locally');
                            saveSectionLocally({
                                section_id: section_id,
                                room_number: roomName,
                                section_code: '',
                                subject_name: ''
                            }, 'rooms');
                            UIkit.notification({message: 'Room saved locally (offline mode - will sync when online)', status: 'success'});
                            document.getElementById('roomForm').reset();
                            loadSectionsWithSchedules();
                        } else {
                            alertContainer.innerHTML = `
                                <div class="uk-alert-danger" uk-alert >
                                    <p><strong>Error:</strong> ${data.message}</p>
                                </div>`;
                        }
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    saveSectionLocally({
                        section_id: section_id,
                        room_number: roomName,
                        section_code: '',
                        subject_name: ''
                    }, 'rooms');
                    UIkit.notification({message: 'Room saved locally (offline mode - will sync when online)', status: 'success'});
                    document.getElementById('roomForm').reset();
                    loadSectionsWithSchedules();
                });
            })
            .catch(error => {
                console.error('Error checking room conflicts:', error);
                UIkit.notification({message: 'Error checking room conflicts. Please try again.', status: 'danger'});
            });
        }
    </script>
</body>
</html>
