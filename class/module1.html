  <div>
    <h3>Section Creation &amp; Assignment</h3>

  </div>

<!-- FORM CARD -->
<div class="uk-card uk-card-default" style="margin-bottom:20px">
  <div class="uk-card-header uk-flex uk-flex-between uk-flex-middle">
    <h5>New Section</h5>
  </div>
  <div class="uk-card-body">
    <form class="uk-grid-small" uk-grid id="sectionForm">
      <div class="uk-width-1-3@m">
        <label class="uk-form-label">Course</label>
        <select class="uk-select" id="sec_program">
          <option value="BSIT">BSIT</option>
          <option value="BSHM">BSHM</option>
        </select>
      </div>
      <div class="uk-width-1-3@m">
        <label class="uk-form-label">Year Level</label>
        <select class="uk-select" id="sec_year">
          <option value="1st Year">1st Year</option>
          <option value="2nd Year">2nd Year</option>
          <option value="3rd Year">3rd Year</option>
          <option value="4th Year">4th Year</option>
        </select>
      </div>
      <div class="uk-width-1-3@m">
        <label class="uk-form-label">Section</label>
        <div id="sectionDebugLog" style="font-size:.75rem;color:#dc2626;margin-bottom:2px"></div>
        <select class="uk-select" id="sec_section">
          <option value="">-- Select Section --</option>
        </select>
      </div>
      <div class="uk-width-2-3@m">
        <label class="uk-form-label">Subject</label>
        <select class="uk-select" id="sec_subject">
          <option value="">-- Select Subject --</option>
        </select>
      </div>
      <div class="uk-width-1-3@m">
        <label class="uk-form-label">Category</label>
        <select class="uk-select" id="sec_category">
          <option value="">-- Select Category --</option>
          <option value="1st Sem">1st Sem</option>
          <option value="2nd Sem">2nd Sem</option>
        </select>
      </div>
      <div class="uk-width-1-1 uk-margin-small-top">
        <button type="button" class="uk-button uk-button-primary uk-width-1-1" onclick="saveSection()" style="height:42px;font-weight:700;justify-content:center">
          <span uk-icon="icon:check;ratio:.85"></span> PROCEED
        </button>
      </div>
    </form>
  </div>
</div>

                return '1st Sem';

            // for BSIT we still have a semester map for individual names if used elsewhere

                return bsitSemester[subject] || '';
            }
            const minorPatterns = [
                /GE\d+/i,
                /\bPE\d?\b/i,

                /Understanding the Self/i,
                /Readings in Philippine History/i,

                /Philippine Tourism/i,
                /Physical Education/i
            ];
            for (const pat of minorPatterns) {
                if (pat.test(subject)) {
                    return 'Minor';
                }
            }
            return 'Major';
        }

                        "MS101 – Discrete Mathematics",
                        "CC103 – Computer Programming 2",
                        "FILDIS – Filipino in Various Disciplines",
                        "NSTP2 – National Service Training Program 2",
                        "PE2 – Folk Dance and Rhythmic Activities"
                    ]
                }
            }
        };

        // attach listener to update category once a subject is chosen
        // Ensure dropdowns are populated on first load
        // (moved here for clarity)
        document.addEventListener('DOMContentLoaded', () => {
            // Attach subject change listener
            const subjElem = document.getElementById('sec_subject');
            if (subjElem) {
                subjElem.addEventListener('change', function() {
                    const prog = document.getElementById('sec_program').value;
                    const catSel = document.getElementById('sec_category');
                    // if the selected option had a semester dataset, use that first
                    const selOpt = this.selectedOptions && this.selectedOptions[0];
                    if (selOpt && selOpt.dataset && selOpt.dataset.sem) {
                        catSel.value = selOpt.dataset.sem;
                    } else {
                        const catVal = determineCategory(this.value, prog);
                        if(catVal) catSel.value = catVal; // preselect if determinable
                    }
                });
            }
            updateSections();
            updateSubjects();
            // Fallback: force repopulate after short delay in case DOM is not ready
            setTimeout(() => {
                const sel = document.getElementById('sec_section');
                if (sel && sel.options.length <= 1) {
                    updateSections();
                }
            }, 200);
        });

        function updateSections() {
            const prog = document.getElementById('sec_program').value;
            const yr = document.getElementById('sec_year').value;
            const sel = document.getElementById('sec_section');
            sel.innerHTML = '<option value="">-- Select Section --</option>';
            // Remove debug log for clean UI
            let debug = document.getElementById('sectionDebugLog');
            if (debug) debug.textContent = '';
            let yearKey = yr ? yr.trim() : '';
            let codes = [];
            if (sectionCodes[prog] && Array.isArray(sectionCodes[prog][yearKey])) {
                // Filter out excluded codes
                codes = sectionCodes[prog][yearKey].filter(code => !isCodeExcluded(prog, code, yearKey));
                codes.forEach(code => {
                    const o = document.createElement('option');
                    o.value = code;
                    o.textContent = code;
                    sel.appendChild(o);
                });
            }
            sel.disabled = false;
            sel.style.display = '';
        }

        // subject dropdown logic removed - not needed anymore

        // attach listeners for dynamic behaviour
        document.getElementById('sec_program').addEventListener('change', function() {
            updateSections();
            updateSubjects();
        });
        // year level now matters again: refresh when it changes
        document.getElementById('sec_year').addEventListener('change', function() {
            updateSections();
            updateSubjects();
        });
        // Ensure section updates when category changes
        document.getElementById('sec_category').addEventListener('change', function() {
            updateSections();
        });

        // load existing sections table helper
        async function loadExistingSections() {
            const tbody = document.getElementById('existingSectionsBody');
            tbody.innerHTML = '<tr><td colspan="6" class="uk-text-center uk-text-muted">Loading...</td></tr>';
            try {
                const json = await apiCall(API_URL + '?action=getSections', {timeout: 5000});
                if (json && json.success && Array.isArray(json.data)) {
                    const rows = json.data.filter(s => {
                        const course = (s.section_code||'').split(' ')[0] || '';
                        const code = s.section_code || '';
                        return !isCodeExcluded(course, code);
                    }).map(s => {
                        const course = (s.section_code||'').split(' ')[0] || '';
                        const room = s.room_number || '';
                        const subject = s.subject_name || '';
                        let cat = s.subject_type || '';
                        // If subject contains ' | ', use the category from the form selection if available
                        if (subject && subject.includes(' | ')) {
                            // Try to infer category from subject value
                            // If s.subject_type is empty, fallback to 1st Sem
                            cat = cat || '1st Sem';
                        }
                        let year = '';
                        if (s.section_code) {
                            const parts = s.section_code.split(' ');
                            if (parts[1]) {
                                const num = parts[1].charAt(0);
                                year = {'1':'1st Year','2':'2nd Year','3':'3rd Year','4':'4th Year'}[num] || '';
                            }
                        }
                        return `
                            <tr>
                                <td>${course}</td>
                                <td>${s.section_code||''}</td>
                                <td>${year}</td>
                                <td>${subject}</td>
                                <td>${cat}</td>
                                <td>${room}</td>
                            </tr>`;
                    }).join('');
                    tbody.innerHTML = rows || '<tr><td colspan="6" class="uk-text-center uk-text-muted">No sections found.</td></tr>'; 
                } else {
                    // Try to load from localStorage cache if offline
                    try {
                        const cached = localStorage.getItem('api_cache_getSections');
                        if (cached) {
                            const cacheData = JSON.parse(cached);
                            if (cacheData && Array.isArray(cacheData)) {
                                const rows = cacheData.filter(s => {
                                    const course = (s.section_code||'').split(' ')[0] || '';
                                    const code = s.section_code || '';
                                    return !isCodeExcluded(course, code);
                                }).map(s => {
                                    const course = (s.section_code||'').split(' ')[0] || '';
                                    const room = s.room_number || '';
                                    const subject = s.subject_name || '';
                                    const cat = s.subject_type || '';
                                    let year = '';
                                    if (s.section_code) {
                                        const parts = s.section_code.split(' ');
                                        if (parts[1]) {
                                            const num = parts[1].charAt(0);
                                            year = {'1':'1st Year','2':'2nd Year','3':'3rd Year','4':'4th Year'}[num] || '';
                                        }
                                    }
                                    return `
                                        <tr style="opacity:0.7;">
                                            <td>${course} <span style="font-size:0.8em; color:#999;">[OFFLINE]</span></td>
                                            <td>${s.section_code||''}</td>
                                            <td>${year}</td>
                                            <td>${subject}</td>
                                            <td>${cat}</td>
                                            <td>${room}</td>
                                        </tr>`;
                                }).join('');
                                tbody.innerHTML = rows || '<tr><td colspan="6" class="uk-text-center uk-text-muted">No cached sections.</td></tr>';
                                return;
                            }
                        }
                    } catch (e) {
                        console.warn('Could not load cache', e);
                    }
                    tbody.innerHTML = '<tr><td colspan="6" class="uk-text-center uk-text-muted">No sections found.</td></tr>'; 
                }
            } catch (err) {
                console.warn('Error loading sections list', err);
                tbody.innerHTML = '<tr><td colspan="6" class="uk-text-center uk-text-danger">Error loading sections (offline mode)</td></tr>';
            }
        }
        // both course and year now determine the available sections. listeners
        // above handle changes appropriately.

        // populate existing sections table and initialise dropdown based on defaults
        updateSections();
        updateSubjects();
        loadExistingSections();

        function saveSection() {
            // Get selected values
            const program = document.getElementById('sec_program').value;
            const year = document.getElementById('sec_year').value;
            const section = document.getElementById('sec_section').value;
            const subjectGroup = document.getElementById('sec_subject').value;
            const category = document.getElementById('sec_category').value;

            if (!section || !subjectGroup || !category) {
                // Optionally, you can keep this notification if you want to require all fields
                return;
            }

            // normalize separators so that commas also behave as pipes
            // keep spaces around pipes for readability; PHP will trim when needed
            let normalizedSubjects = subjectGroup.replace(/,\s*/g, ' | ');
            // leave existing pipes as-is (may contain spaces already)

            // Prepare data for API (must match backend expectations)
            const formData = new FormData();
            formData.append('action', 'saveSection');
            formData.append('sec_name', section);
            formData.append('sec_sub', normalizedSubjects);
            formData.append('sec_cat', category);
            formData.append('sec_year', year);

            // Store last created section code for module3 auto-select
            try {
                localStorage.setItem('lastCreatedSection', section);
            } catch (e) {}
            // Send to API (POST) as form data
            fetch(API_URL, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    UIkit.notification({message: 'Section(s) saved!', status: 'success'});
                } else {
                    UIkit.notification({message: 'Error: ' + (data.message || 'Save failed'), status: 'danger'});
                }
                // Instantly redirect to module3.html after attempt
                if (window.parent && typeof window.parent.loadModule === 'function') {
                    window.parent.loadModule('module3.html');
                } else {
                    window.location.href = 'module3.html';
                }
            })
            .catch(err => {
                UIkit.notification({message: 'Network error. Proceeding to next step.', status: 'warning'});
                if (window.parent && typeof window.parent.loadModule === 'function') {
                    window.parent.loadModule('module3.html');
                } else {
                    window.location.href = 'module3.html';
                }
                console.error(err);
            });
        }
    </script>
</body>
</html>
